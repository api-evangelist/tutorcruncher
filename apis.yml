aid: tutorcruncher
url: https://raw.githubusercontent.com/api-evangelist/tutorcruncher/refs/heads/main/apis.yml
name: TutorCruncher
kind: company
description: TutorCruncher is tutoring business management software for agencies,
  companies, and independent tutors - handling clients, students, tutors, lesson
  scheduling, invoicing, and payments. Its documented REST API (base
  https://app.tutorcruncher.com/api/, token-authenticated) exposes clients,
  recipients (students), contractors (tutors), agents, services (jobs),
  appointments (lessons), invoices, payment orders, proforma invoices, ad hoc
  charges, and reference data, with HTTP webhooks for event notifications. Its
  "Socket" product is a JavaScript embed for publishing public tutor and lesson
  listings on a provider's own website - not a WebSocket API.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Tutoring
- Education
- Business Management
- Scheduling
- Invoicing
- Payments
- EdTech
