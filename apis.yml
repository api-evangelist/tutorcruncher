  description: Discover the event catalog and consume webhooks. List the 150+ action
    types that can fire, then receive HTTP webhook POSTs (signed with an
    HMAC-SHA256 Webhook-Signature header, retried with exponential backoff) at a URL
    configured in System > Settings > Integrations. This is HTTP push, not a
    WebSocket.
