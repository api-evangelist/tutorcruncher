        The OpenAPI document models the standard CRUD verbs (list/create/get/
        update/delete) for each resource per TutorCruncher's documented REST
        conventions. Exact write payload fields for some resources were inferred
        from the documented model and should be confirmed field-by-field against
        the live reference during reconciliation.
