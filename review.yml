actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. TutorCruncher's public API is
    request/response REST, and its asynchronous surface is HTTP webhooks
    (server-to-endpoint push), not a client-consumable WebSocket or SSE stream.
    No AsyncAPI document was created because there is no server-push streaming
    transport on TutorCruncher's own API to model, and the "Socket" product is a
    front-end JavaScript embed rather than a network/WebSocket API.
