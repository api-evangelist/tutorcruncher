aid: tutorcruncher
name: TutorCruncher
review:
  question: Does TutorCruncher expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. TutorCruncher's public API is
    request/response REST over HTTPS (base https://app.tutorcruncher.com/api/).
    Its event/notification mechanism is HTTP webhooks - TutorCruncher POSTs a
    signed JSON payload to a URL you configure under System > Settings >
    Integrations. That is server-to-endpoint HTTP push, not a WebSocket or SSE
    stream, and there is no client-consumable server-push transport on
    TutorCruncher's own API to model. TutorCruncher's "Socket" product is a
    JavaScript embed (cdn.tutorcruncher.com/socket/latest/socket.js) that renders
    public tutor and lesson listings on a provider's website; despite the name it
    is a front-end widget, not a WebSocket API.
findings:
  summary: |
    TutorCruncher does not publish a documented public WebSocket API. The
    platform exposes a REST API at https://app.tutorcruncher.com/api/,
    authenticated with a private API key sent as `Authorization: token <API
    KEY>`, rate limited to 100 requests/minute, with list endpoints paginated at
    100 objects per page (count/next/previous/results). The API is now v2 (v1 was
    deprecated 2025-07-03); in v2, users are updated by ID via POST. Real
    resources include clients, recipients (students), contractors (tutors),
    agents, services (jobs), appointments (lessons), invoices, payment orders,
    proforma invoices, ad hoc charges, and reference data (subjects, countries,
    skills, qualification levels, labels, pipeline stages, action types).
    Asynchronous event delivery is via HTTP webhooks: TutorCruncher POSTs an
    `events` array to a configured URL, signs it with an HMAC-SHA256
    Webhook-Signature header, retries up to 4 times with exponential backoff
    (1s/10s/100s/1000s), and auto-disables endpoints that exceed a 20% failure
    rate. No ws:// or wss:// endpoint is documented anywhere.
  socketClarification: |
    "TutorCruncher Socket" is NOT a WebSocket. It is a JavaScript embed loaded
    via <script src="https://cdn.tutorcruncher.com/socket/latest/socket.js">
    that publishes public tutor listings, lesson listings, and enquiry forms on
    a customer's own website. The name refers to the embeddable widget product,
    not to a network socket / WebSocket transport.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://app.tutorcruncher.com/api
      documented: true
      note: Token-authenticated request/response REST. All documented resources.
    - protocol: Webhook
      scheme: https
      documented: true
      note: HTTP POST push to a configured URL, HMAC-SHA256 signed, retried with exponential backoff. Server-to-endpoint HTTP, not WebSocket.
    - protocol: JavaScript Embed (Socket)
      scheme: https
      documented: true
      note: cdn.tutorcruncher.com/socket/latest/socket.js front-end widget for public listings. Not a WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in TutorCruncher's API reference or help center as of the review date.
