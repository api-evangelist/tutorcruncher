publisherName: TutorCruncher
serviceCategory: Business Management Software
billingModel:
  pricingCategory: Subscription-Plus-Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Tax
meters:
- name: subscription_base
  description: Fixed monthly subscription fee for the chosen plan tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: card_transaction_fees
  description: Percentage fee charged on card payments processed through the platform (3.85% / 3.5% / negotiated by tier).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - plan
- name: offline_transaction_fees
  description: Percentage fee on offline / non-integrated payments (1% / 0.65% / 0.5% by tier).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - plan
- name: card_surcharges
  description: Additional surcharges for international cards (+1.5%) and Amex/Diners/JCB/UnionPay/prepaid cards (+2%).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - card_type
principles:
- name: Visibility
  description: Track subscription tier plus the split of card vs offline payment volume and the surcharge-eligible payment mix.
- name: Allocation
  description: Attribute transaction fees to the branches, services, or clients whose payments generated them.
- name: Optimization
  description: Move to a higher tier when payment volume makes the lower per-transaction rate cheaper than the higher base fee; steer payments toward lower-fee methods and away from surcharge-eligible cards where possible.
- name: Accountability
  description: Review monthly base + transaction spend against processed payment volume; confirm API automation is not inflating surcharge-eligible flows.
