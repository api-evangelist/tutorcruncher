description: >-
  FinOps view of TutorCruncher spend. TutorCruncher is a tiered SaaS
  subscription (Pay as you go $30, Startup $80, Enterprise $240 per month on US
  list pricing) with API access gated to the Enterprise tier. The dominant
  variable cost is payment-processing (transaction) fees charged on money moved
  through the platform - a card-payment percentage that decreases with higher
  tiers, plus surcharges for international cards and certain card networks, and a
  smaller percentage on offline/non-integrated payments. There is no separate
  per-call API fee. Cost is therefore driven by subscription tier plus payment
  volume, not by API usage.
notes: >-
  Reconcile current base prices and transaction rates against the pricing page.
  API automation does not add metered API cost, but automating more payment flows
  will increase transaction-fee spend proportionally to processed volume.
sources:
- https://tutorcruncher.com/pricing/us
